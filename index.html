<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JLS CHESS VOCA Master</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Round:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4A90E2; --secondary: #FFD93D; --bg: #F0F7FF; --card: #FFFFFF; --text: #2D3436; --accent: #FF6B6B; --success: #6BCB77; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Nanum Round', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; text-align: center; }
        h1 { font-size: 1.6rem; font-weight: 800; color: var(--primary); margin: 20px 0; }
        
        /* 설정 및 탭 */
        .setup-box { background: var(--card); padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(74, 144, 226, 0.15); margin-bottom: 20px; display: flex; flex-direction: column; gap: 12px; }
        select { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid #E1E8EE; background: #fff; font-size: 16px; font-family: inherit; }
        .row { display: flex; gap: 10px; } .row select { flex: 1; }
        #btn-study { background: var(--primary); color: white; padding: 16px; border-radius: 18px; border: none; font-size: 1.2rem; font-weight: 800; cursor: pointer; box-shadow: 0 5px 0 #357ABD; margin-top: 5px; }
        #btn-study:active { transform: translateY(3px); box-shadow: none; }

        /* 학습 모드 탭 (DSB/DSC에서도 보여야 함) */
        .tab-menu { display: none; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .tab-btn { padding: 12px; border-radius: 15px; border: none; background: #BDC3C7; font-weight: 800; font-size: 1rem; cursor: pointer; color: #fff; }
        .tab-btn.active { background: var(--primary); }

        #lesson-subtitle { margin: 10px 0 20px; font-size: 1.1rem; font-weight: 800; color: #576574; display: none; background: #fff; padding: 10px; border-radius: 15px; border: 2px dashed var(--primary); }
        #study-area, #test-area, #puzzle-area { display: none; }
        
        /* 카드 및 퀴즈 스타일 */
        .word-card { background: var(--card); padding: 18px; border-radius: 22px; display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border: 2px solid #fff; box-shadow: 0 6px 15px rgba(0,0,0,0.04); text-align: left; }
        .word-content { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .word-text { font-size: 1.35rem; font-weight: 800; color: var(--primary); }
        .mean-text { font-size: 1.15rem; font-weight: 700; color: #636e72; }
        .def-text { color: #eb4d4b; font-size: 0.9rem; font-style: italic; margin-top: 4px; border-top: 1px solid #eee; padding-top: 4px; }
        
        .hidden { background-color: var(--secondary) !important; color: transparent !important; border-radius: 10px; cursor: pointer; position: relative; min-height: 1.4em; }
        .hidden::after { content: '👀 Click!'; color: #fff; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); font-size: 0.8rem; font-weight: 800; }
        .tts-icon { width: 50px; height: 50px; border-radius: 50%; border: none; background: #F8F9FA; font-size: 1.4rem; cursor: pointer; box-shadow: 0 3px 0 #ddd; border: 2px solid #DFF9FB; }
        
        .quiz-box { background: #fff; padding: 20px; border-radius: 25px; margin-bottom: 15px; text-align: left; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .quiz-q { font-size: 1.2rem; font-weight: 800; margin-bottom: 15px; color: var(--text); }
        .quiz-opts { display: grid; gap: 10px; }
        .quiz-opt { padding: 14px; border-radius: 15px; border: 2px solid #E1E8EE; background: #fff; font-weight: 700; text-align: left; cursor: pointer; font-size: 1rem; }
        .quiz-opt.correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .quiz-opt.wrong { background: var(--accent) !important; color: white; border-color: var(--accent); }

        .puzzle-box { background: #fff; padding: 20px; border-radius: 25px; margin-bottom: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .puz-hint { font-weight: 800; color: #576574; font-size: 1rem; margin-bottom: 12px; }
        .puz-input { width: 100%; padding: 14px; border-radius: 15px; border: 3px solid var(--primary); font-size: 1.2rem; text-align: center; font-weight: 800; background: #F0F7FF; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌟 CHESS VOCA Master 🌟</h1>

    <div class="setup-box">
        <select id="level" onchange="updateUI()">
            <option value="">레벨 선택 (Select Level)</option>
            <optgroup label="⭐ DS Level">
                <option value="DSB1">DSB 1</option><option value="DSB2">DSB 2</option>
                <option value="DSC1">DSC 1</option><option value="DSC2">DSC 2</option>
                <option value="DSD1">DSD 1</option><option value="DSD2">DSD 2</option>
            </optgroup>
            <optgroup label="🌟 LS Level">
                <option value="LSA1">LSA 1</option><option value="LSA2">LSA 2</option>
                <option value="LSB1">LSB 1</option><option value="LSB2">LSB 2</option>
                <option value="LSC1">LSC 1</option><option value="LSC2">LSC 2</option>
                <option value="LSD1">LSD 1</option><option value="LSD2">LSD 2</option>
            </optgroup>
            <optgroup label="🔥 MS Level">
                <option value="MSA1">MSA 1</option><option value="MSA2">MSA 2</option>
                <option value="MSB1">MSB 1</option><option value="MSB2">MSB 2</option>
            </optgroup>
        </select>
        <div class="row"><select id="book"><option value="">교재</option></select><select id="lesson"><option value="">레슨</option></select></div>
        <button id="btn-study" onclick="startStudy()">학습 시작! START</button>
    </div>

    <div class="tab-menu" id="main-tabs">
        <button id="tab-study" class="tab-btn active" onclick="switchTab('study')">Study</button>
        <button id="tab-test" class="tab-btn" onclick="switchTab('test')">Test</button>
        <button id="tab-puzzle" class="tab-btn" onclick="switchTab('puzzle')">Puzzle</button>
    </div>

    <div id="lesson-subtitle"></div>

    <div id="study-area">
        <div id="study-options" style="display:flex; justify-content:center; gap:10px; margin-bottom
