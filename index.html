<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHESS VOCA Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <script type="module">
        import { KokoroWeb } from 'https://cdn.jsdelivr.net/npm/kokoro-js@1.1.0/dist/index.js';
        window.KokoroWeb = KokoroWeb;
    </script>

    <style>
        :root { --primary: #1a73e8; --bg: #f8fafc; --card: #ffffff; --text: #3c4043; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }
        .setup-box { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        select, button { padding: 12px; border-radius: 8px; border: 1px solid #dadce0; font-size: 14px; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; min-width: 100px; }
        .controls { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: none; justify-content: center; gap: 20px; border: 1px solid #eee; }
        .word-list { display: grid; gap: 10px; }
        .word-card { background: var(--card); padding: 15px; border-radius: 8px; display: flex; align-items: center; gap: 15px; border: 1px solid #eee; }
        .word-text { font-size: 1.1rem; font-weight: 700; width: 200px; color: #1a73e8; }
        .mean-text { font-size: 1rem; color: #5f6368; flex: 1; }
        .hidden { background: #e8eaed !important; color: transparent !important; border-radius: 4px; user-select: none; cursor: pointer; }
        .tts-icon { background: none; border: none; font-size: 1.2rem; cursor: pointer; }
        #status-area { font-size: 0.9rem; margin-bottom: 10px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>정상어학원 VOCA Master</h1>
        <div id="status-area">음성 엔진 준비 중...</div>
    </header>

    <div class="setup-box">
        <select id="level" onchange="updateUIByLevel()">
            <option value="">레벨 선택</option>
            <optgroup label="DS Level">
                <option value="DSB1">DSB 1</option><option value="DSB2">DSB 2</option>
                <option value="DSC1">DSC 1</option><option value="DSC2">DSC 2</option>
                <option value="DSD1">DSD 1</option><option value="DSD2">DSD 2</option>
            </optgroup>
            <optgroup label="LS Level">
                <option value="LSA1">LSA 1</option><option value="LSA2">LSA 2</option>
                <option value="LSB1">LSB 1</option><option value="LSB2">LSB 2</option>
                <option value="LSC1">LSC 1</option><option value="LSC2">LSC 2</option>
                <option value="LSD1">LSD 1</option><option value="LSD2">LSD 2</option>
            </optgroup>
            <optgroup label="MS Level">
                <option value="MSA1">MSA 1</option><option value="MSA2">MSA 2</option>
                <option value="MSB1">MSB 1</option><option value="MSB2">MSB 2</option>
            </optgroup>
        </select>
        <select id="book"></select>
        <select id="lesson"></select>
        <button id="btn-study" onclick="fetchAndLoad()">학습 시작</button>
    </div>

    <div id="controls" class="controls">
        <label><input type="checkbox" id="chkEng" onchange="renderWords()"> 영어 가리기</label>
        <label><input type="checkbox" id="chkKor" onchange="renderWords()"> 한글 가리기</label>
        <label id="lblDef" style="display:none;"><input type="checkbox" id="chkDef" onchange="renderWords()"> 영영 가리기</label>
    </div>

    <div id="display-area"></div>
</div>

    let words = [];

        const status = document.getElementById('status-area');
        try {
