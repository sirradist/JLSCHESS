<script type="module">
    // 더 안정적인 호스팅 서비스(ESM.sh)를 통해 라이브러리를 불러옵니다.
    import { KokoroWeb } from 'https://esm.sh/kokoro-js@1.0.0';
    window.KokoroWeb = KokoroWeb;
</script>

<script>
    // 로딩 로직 보강
    async function initTTS() {
        const fill = document.getElementById('status-fill');
        const status = document.getElementById('tts-status');
        
        try {
            status.innerText = "모델 서버 연결 중...";
            fill.style.width = "20%";

            // 모델 주소를 직접 지정하여 라이브러리가 길을 잃지 않게 합니다.
            kokoro = await window.KokoroWeb.new({ 
                model: 'https://huggingface.co/onnx-community/Kokoro-82M-v1.0-ONNX/resolve/main/model.onnx',
                onProgress: (p) => {
                    // 실제 다운로드 진행률을 막대에 표시합니다.
                    fill.style.width = (20 + (p * 0.8)) + "%";
                }
            });

            fill.style.width = "100%";
            status.innerHTML = "<span class='ready'>Bella 여성 음성 준비 완료 ✨</span>";
            document.getElementById('btn-study').disabled = false;
        } catch (e) {
            console.error("로딩 에러:", e);
            status.innerText = "로딩 실패: 시스템 음성으로 자동 전환되었습니다.";
            // 실패해도 학습은 가능하게 버튼을 열어줍니다.
            document.getElementById('btn-study').disabled = false;
        }
    }
</script>
