<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JLS CHESS VOCA Master</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Round:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        /* 기존 디자인 스타일 완벽 복구 */
        :root { --p: #4A90E2; --s: #FFD93D; --bg: #F0F7FF; --c: #FFFFFF; --t: #2D3436; --err: #FF6B6B; --ok: #6BCB77; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Nanum Round', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--t); display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 600px; text-align: center; }
        
        /* 헤더 및 셋업 박스 */
        header { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 15px 0; }
        .logo-box { height: 45px; display: flex; align-items: center; }
        .logo-img { height: 100%; width: auto; object-fit: contain; }
        h1 { font-size: 1.5rem; color: var(--p); margin: 0; font-weight: 800; }
        .setup-box { background: var(--c); padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(74, 144, 226, 0.1); margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        select, .btn-main { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid #E1E8EE; font-size: 16px; font-family: inherit; outline: none; }
        .row { display: flex; gap: 10px; } .row select { flex: 1; }
        .btn-main { background: var(--p); color: #fff; border: none; font-weight: 800; cursor: pointer; box-shadow: 0 4px 0 #357ABD; }
        
        /* 탭 메뉴 디자인 복구 */
        .tab-menu { display: none; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .tab-btn { padding: 12px; border-radius: 12px; border: none; background: #BDC3C7; color: #fff; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: var(--p); }

        /* 부제목 스타일 */
        #lesson-subtitle { margin: 15px 0; font-size: 1.1rem; font-weight: 800; color: var(--p); background: #fff; padding: 12px; border-radius: 15px; border: 2px dashed var(--p); }
        
        /* Study/Test 카드 디자인 복구 (이미지 image_9877e0.png 기반) */
        .card { background: var(--c); padding: 20px; border-radius: 25px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(74,144,226,0.08); text-align: left; }
        .word-text { font-size: 1.3rem; font-weight: 800; color: var(--p); }
        .mean-text { font-size: 1.05rem; font-weight: 700; color: #636e72; margin-top: 4px; }
        .tts-icon { width: 44px; height: 44px; border-radius: 12px; border: none; background: #F8F9FA; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 -2px 0 #ddd; }

        /* Test 문제지 디자인 (이미지 image_9877d8.png 기반) */
        .q-box { background: transparent; padding: 10px 0; border-bottom: 1px solid #E1E8EE; margin-bottom: 20px; text-align: center; }
        .q-text { font-size: 1.2rem; font-weight: 800; margin-bottom: 15px; color: #2D3436; }
        .q-opts { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .q-opt { padding: 10px 18px; border-radius: 12px; border: 2px solid #E1E8EE; background: #fff; font-weight: 700; cursor: pointer; transition: 0.2s; }

        /* 퍼즐 격자 디자인 최적화 */
        .cw-wrap { overflow-x: auto; background: #fff; padding: 15px; border-radius: 25px; margin-bottom: 15px; border: 2px solid #E1E8EE; }
        .cw-grid { display: grid; gap: 1px; background: #ccc; border: 1px solid #ccc; margin: 0 auto; width: max-content; }
        .cell { width: 32px; height: 32px; position: relative; }
        .cell.empty { background: #34495e !important; }
        .cell.active { background: #fff !important; }
        .cell input { width: 100%; height: 100%; border: none; text-align: center; font-size: 1.1rem; font-weight: 800; text-transform: uppercase; color: var(--p); background: transparent; outline: none; }
        .cell-num { position: absolute; top: 1px; left: 2px; font-size: 0.5rem; color: #999; font-weight: 700; pointer-events: none; }
        
        .btn-action { background: var(--s); color: var(--t); padding: 15px; border-radius: 18px; border: none; font-weight: 800; width: 100%; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 0 #D4B531; font-size: 1.1rem; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="logo-box"><img src="data/JLS%20Logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none'"></div>
        <h1>CHESS VOCA Master</h1>
    </header>

    <div class="setup-box">
        <select id="level" onchange="updateUI()"><option value="">레벨 선택</option><optgroup label="DS"><option value="DSB1">DSB 1</option></optgroup></select>
        <div class="row"><select id="book" onchange="updateUIByBook()"></select><select id="lesson"></select></div>
        <button class="btn-main" onclick="startStudy()">START!</button>
    </div>

    <div id="book-image-container" style="display:none;"><img id="book-cover" src="" style="max-width:100px; margin-bottom:15px; border-radius:10px;"></div>
    <div class="tab-menu" id="main-tabs">
        <button id="tab-study" class="tab-btn active" onclick="switchTab('study')">Study</button>
        <button id="tab-test" class="tab-btn" onclick="switchTab('test')">Test</button>
        <button id="tab-puzzle" class="tab-btn" onclick="switchTab('puzzle')">Puzzle</button>
    </div>
    
    <div id="lesson-subtitle" style="display:none;"></div>

    <div id="study-area" style="display:none;"><div id="study-list"></div></div>
    <div id="test-area" style="display:none;"><button class="btn-main" style="margin-bottom:20px;" onclick="renderTest()">문제 다시 만들기 🔄</button><div id="test-list"></div></div>
    <div id="puzzle-area" style="display:none;">
        <div id="cw-info" style="font-weight:800; color:var(--p); margin-bottom:10px;"></div>
        <div class="cw-wrap" id="cw-box"></div>
        <button class="btn-action" onclick="checkCW()">정답 확인 ✔️</button>
        <div class="h-box" id="cw-hints" style="margin-top:20px; background:#fff; padding:20px; border-radius:20px; text-align:left;"></div>
    </div>
</div>

<script>
    let cData = { words: [] }, curStage = 1, lastDir = 'H';

    // 기존 데이터 로딩 및 UI 업데이트 함수 유지
    function updateUI() { /* ...기존 로직... */ }
    function updateUIByBook() { /* ...기존 로직... */ }
    async function startStudy() {
        const v = document.getElementById('level').value, b = document.getElementById('book').value, l = document.getElementById('lesson').value;
        if(!v||!b||!l) return alert("모두 선택하세요!");
        try {
            const res = await fetch(`data/${v}_${b}_${l}.json`);
            cData = await res.json();
            document.getElementById('main-tabs').style.display = "grid";
            const sub = document.getElementById('lesson-subtitle');
            if(cData.subtitle) { sub.innerText = "📖 " + cData.subtitle; sub.style.display="block"; }
            switchTab('study');
        } catch(e) { alert("데이터를 불러올 수 없습니다."); }
    }

    function switchTab(t) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
        ['study-area','test-area','puzzle-area'].forEach(id => document.getElementById(id).style.display='none');
        document.getElementById(t+'-area').style.display='block';
        if(t==='study') renderStudy(); if(t==='test') renderTest(); if(t==='puzzle') createCW();
    }

    // 카드 스타일 Study 레이아웃 복구
    function renderStudy() {
        document.getElementById('study-list').innerHTML = (cData.words || cData).map(w => `
            <div class="card">
                <button class="tts-icon" onclick="speak('${w.en}')">🔊</button>
                <div class="word-content">
                    <div class="word-text">${w.en}</div>
                    <div class="mean-text">${w.ko}</div>
                </div>
            </div>`).join('');
    }

    // 버튼 스타일 Test 레이아웃 복구
    function renderTest() {
        const list = [...(cData.words || cData)].sort(() => Math.random() - 0.5).slice(0, 10);
        document.getElementById('test-list').innerHTML = list.map((w, i) => {
            const type = Math.random() > 0.5 ? "E2K" : "K2E";
            const ans = type === "E2K" ? w.ko : w.en;
            const opts = [ans, ...cData.words.filter(x => x.en !== w.en).sort(() => Math.random() - 0.5).slice(0, 3).map(x => type === "E2K" ? x.ko : x.en)].sort(() => Math.random() - 0.5);
            return `<div class="q-box">
                <div class="q-text">${i+1}. ${type==="E2K"?w.en:w.ko}</div>
                <div class="q-opts">${opts.map(o => `<button class="q-opt" onclick="checkAnswer(this,'${o}','${ans}')">${o}</button>`).join('')}</div>
            </div>`;
        }).join('');
    }

    function checkAnswer(btn, choice, correct) {
        if(choice === correct) { btn.classList.add('ok'); } else btn.classList.add('no');
    }

    // 크로스워드 핵심 로직 (디자인 유지하면서 성능 개선)
    function createCW() {
        const box = document.getElementById('cw-box'), hBox = document.getElementById('cw-hints'), sz = 20;
        const allW = (cData.words || cData).map((w, i) => ({ a: w.en.split('-')[0].trim().toUpperCase().replace(/[^A-Z]/g,''), h: w.ko, id: i+1 }));
        const half = Math.ceil(allW.length / 2);
        let ws = (curStage === 1) ? allW.slice(0, half) : allW.slice(half);

        let grid, placed;
        for(let attempt=0; attempt<50; attempt++) {
            grid = Array(sz).fill().map(() => Array(sz).fill(null));
            placed = [];
            let sortedWs = [...ws].sort((a,b) => b.a.length - a.a.length);

            for(let w of sortedWs) {
                let best = null, possibilities = [];
                for(let r=0; r<sz; r++) {
                    for(let c=0; c<sz; c++) {
                        for(let d of ['H', 'V']) {
                            if((d==='H' && c+w.a.length<=sz) || (d==='V' && r+w.a.length<=sz)) {
                                let over = 0, fail = false;
                                for(let i=0; i<w.a.length; i++) {
                                    let rr = r+(d==='V'?i:0), cc = c+(d==='H'?i:0);
                                    if(grid[rr][cc]) {
                                        if(!grid[rr][cc].char.split(',').includes(w.a[i])) fail = true;
                                        else over += 100;
                                    }
                                    if(d==='H') { if((r>0 && grid[r-1][cc]) || (r<sz-1 && grid[r+1][cc])) fail = true; }
                                    else { if((c>0 && grid[rr][c-1]) || (c<sz-1 && grid[rr][c+1])) fail = true; }
                                }
                                if(!fail) possibilities.push({ r, c, d, over });
                            }
                        }
                    }
                }
                if(possibilities.length > 0) {
                    possibilities.sort((a,b) => b.over - a.over);
                    best = possibilities[0];
                } else {
                    let found = false;
                    for(let r=0; r<sz && !found; r+=2) {
                        for(let c=0; c<sz && !found; c+=2) {
                            for(let d of ['V', 'H']) {
                                if(!found && ((d==='H' && c+w.a.length<=sz) || (d==='V' && r+w.a.length<=sz))) {
                                    let can = true;
                                    for(let i=0; i<w.a.length; i++) {
                                        let rr = r+(d==='V'?i:0), cc = c+(d==='H'?i:0);
                                        if(grid[rr][cc]) { can = false; break; }
                                    }
                                    if(can) { best = { r, c, d, over: 0 }; found = true; }
                                }
                            }
                        }
                    }
                }
                if(best) {
                    for(let i=0; i<w.a.length; i++) {
                        let rr = best.r+(best.d==='V'?i:0), cc = best.c+(best.d==='H'?i:0);
                        let existing = grid[rr][cc];
                        let numObj = existing ? {...existing.nums} : {};
                        if(i===0) numObj[best.d] = w.id;
                        grid[rr][cc] = { char: (existing?existing.char+','+w.a[i]:w.a[i]), nums: numObj, d: (existing?existing.d+best.d:best.d) };
                    }
                    placed.push({ ...best, ...w });
                }
            }
            if(placed.length === ws.length) break;
        }

        box.innerHTML = `<div class="cw-grid" style="grid-template-columns: repeat(${sz}, 32px);">` + 
            grid.map((row, r) => row.map((cell, c) => {
                if(!cell) return `<div class="cell empty"></div>`;
                let ns = Object.values(cell.nums), label = ns.length > 0 ? Math.min(...ns) : "";
                return `<div class="cell active">${label?`<span class="cell-num">${label}</span>`:''}<input type="text" maxlength="1" data-ans="${cell.char}" data-r="${r}" data-c="${c}" data-dir="${cell.d}" onfocus="setDir(this)" oninput="smartMove(this)"></div>`;
            }).join('')).join('') + `</div>`;

        hBox.innerHTML = ws.map(w => {
            const p = placed.find(pl => pl.id === w.id);
            return `<div style="margin-bottom:8px; font-weight:700;">${w.id}. ${w.h} (${p?(p.d.includes('H')?'가로':'세로'):'미배치'}, ${w.a.length}자)</div>`;
        }).join('');
    }

    function setDir(el) { lastDir = el.dataset.dir.length > 1 ? lastDir : el.dataset.dir; el.select(); }
    function smartMove(el) {
        el.value = el.value.toUpperCase();
        if(el.value.length >= 1) {
            const r = parseInt(el.dataset.r), c = parseInt(el.dataset.c);
            let nextR = (lastDir === 'H') ? r : r+1, nextC = (lastDir === 'H') ? c+1 : c;
            const next = document.querySelector(`input[data-r="${nextR}"][data-c="${nextC}"]`);
            if(next) setTimeout(() => next.focus(), 10);
        }
    }
</script>
</body>
</html>
