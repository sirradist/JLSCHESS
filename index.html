<script>
    window.initTTS = async function() {
        const status = document.getElementById('status-area');
        try {
            status.innerText = "Bella 엔진 초기화 중 (추가 파일 없이 로드)...";
            
            // 1. 모델 파일을 가져옵니다.
            const response = await fetch('./model.onnx');
            const modelData = await response.arrayBuffer();

            // 2. 핵심: 외부 config.json을 찾지 않도록 설정을 직접 정의해서 주입합니다.
            // 이 방식은 파일 누락 에러를 완벽하게 방어합니다.
            window.tts = await window.KokoroTTS.from_pretrained(modelData, {
                model_file_structure: 'flat',
                // 라이브러리가 내부적으로 사용하는 설정값들을 직접 전달
                config: {
                    model_type: "kokoro",
                    architectures: ["KokoroTTS"],
                    vocab_size: 178,
                    hidden_size: 256,
                    num_hidden_layers: 8,
                    num_attention_heads: 8,
                    intermediate_size: 1024,
                    num_voices: 11,
                    sample_rate: 24000
                },
                dtype: 'q8'
            });

            status.innerHTML = "<span style='color:#34a853'>✅ Bella 음성 엔진 준비 완료</span>";
            document.querySelectorAll('select, button').forEach(el => el.disabled = false);
            if(window.updateUIByLevel) window.updateUIByLevel();
        } catch (e) {
            console.error("초기화 실패:", e);
            status.innerText = "⚠️ 시스템 음성 모드로 작동 중";
            document.querySelectorAll('select, button').forEach(el => el.disabled = false);
        }
    };
</script>
