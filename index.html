<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JLS CHESS VOCA Master</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Round:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4A90E2; --secondary: #FFD93D; --accent: #FF6B6B;
            --success: #6BCB77; --bg: #F0F7FF; --card: #FFFFFF; --text: #2D3436;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Nanum Round', sans-serif; background-color: var(--bg);
            margin: 0; padding: 15px; color: var(--text); line-height: 1.6;
        }
        .container { max-width: 500px; margin: 0 auto; }
        header { text-align: center; padding: 15px 0; }
        h1 { font-size: 1.6rem; font-weight: 800; color: var(--primary); margin: 0; letter-spacing: -1px; }
        
        /* 설정 박스 디자인 대폭 수정 */
        .setup-box {
            background: var(--card); padding: 20px; border-radius: 25px;
            box-shadow: 0 10px 25px rgba(74, 144, 226, 0.15); margin-bottom: 25px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
            border: 2px solid #fff;
        }
        select {
            width: 100%; padding: 14px; border-radius: 15px; border: 2px solid #E1E8EE;
            background: #fdfdfd; font-size: 16px; font-family: inherit; color: var(--text);
            appearance: none; cursor: pointer;
        }
        #level { grid-column: span 2; border-color: var(--primary); background: #f0f7ff; }
        
        #btn-study {
            grid-column: span 2; background: var(--primary); color: white;
            padding: 16px; border-radius: 18px; border: none; font-size: 1.2rem;
            font-weight: 800; cursor: pointer; margin-top: 8px;
            box-shadow: 0 5px 0 #357ABD; transition: all 0.1s;
        }
        #btn-study:active { transform: translateY(3px); box-shadow: none; }

        /* 학습 컨트롤러 */
        #controls {
            display: none; justify-content: center; gap: 20px; margin-bottom: 20px;
            padding: 12px; background: rgba(255, 255, 255, 0.6); border-radius: 35px;
            backdrop-filter: blur(5px);
        }
        .control-item { display: flex; align-items: center; gap: 8px; font-size: 1rem; font-weight: 700; color: var(--primary); }

        /* 단어 카드 디자인 보강 */
        .word-card {
            background: var(--card); padding: 18px; border-radius: 22px; display: flex;
            align-items: center; gap: 15px; margin-bottom: 15px; border: 2px solid #fff;
            box-shadow: 0 6px 15px rgba(0,0,0,0.04); transition: transform 0.2s;
        }
        .word-content { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .word-text { font-size: 1.35rem; font-weight: 800; color: var(--primary); }
        .mean-text { font-size: 1.15rem; font-weight: 700; color: #636e72; }

        /* 가리기 효과 전용 스타일 */
        .hidden { background-color: var(--secondary) !important; color: transparent !important; border-radius: 10px; cursor: pointer; position: relative; min-height: 1.4em; }
        .hidden::after { content: '👀 Click!'; color: #fff; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); font-size: 0.8rem; font-weight: 800; }

        .tts-icon { width: 50px; height: 50px; border-radius: 50%; border: none; background: #F8F9FA; font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 0 #ddd; }
        .tts-icon:active { transform: translateY(2px); box-shadow: none; }
        .en-btn { border: 2px solid #DFF9FB; }
        .ko-btn { border: 2px solid #FFF5D7; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🌟 CHESS VOCA Master 🌟</h1>
    </header>

    <div class="setup-box">
        <select id="level" onchange="window.updateUIByLevel()">
            <option value="">레벨을 골라주세요!</option>
            <optgroup label="⭐ DS Level">
                <option value="DSB1">DSB 1</option><option value="DSB2">DSB 2</option>
                <option value="DSC1">DSC 1</option><option value="DSC2">DSC 2</option>
                <option value="DSD1">DSD 1</option><option value="DSD2">DSD 2</option>
            </optgroup>
            <optgroup label="🌟 LS Level">
                <option value="LSA1">LSA 1</option><option value="LSA2">LSA 2</option>
                <option value="LSB1">LSB 1</option><option value="LSB2">LSB 2</option>
                <option value="LSC1">LSC 1</option><option value="LSC2">LSC 2</option>
                <option value="LSD1">LSD 1</option><option value="LSD2">LSD 2</option>
            </optgroup>
            <optgroup label="🔥 MS Level">
                <option value="MSA1">MSA 1</option><option value="MSA2">MSA 2</option>
                <option value="MSB1">MSB 1</option><option value="MSB2">MSB 2</option>
            </optgroup>
        </select>
        <select id="book"><option value="">Book</option></select>
        <select id="lesson"><option value="">Lesson</option></select>
        <button id="btn-study" onclick="window.fetchAndLoad()">학습 시작! START</button>
    </div>

    <div id="controls">
        <label class="control-item"><input type="checkbox" id="chkEng" onchange="window.renderWords()"> English 👀</label>
        <label class="control-item"><input type="checkbox" id="chkKor" onchange="window.renderWords()"> 한글 👀</label>
    </div>

    <div id="display-area"></div>
</div>

<script>
    window.words = [];
    const synth = window.speechSynthesis;
    let engVoice = null, korVoice = null;

    function initVoices() {
        const voices = synth.getVoices();
        engVoice = voices.find(v => v.name.includes('Google US English')) || voices.find(v => v.lang.startsWith('en'));
        korVoice = voices.find(v => v.name.includes('Google 한국어')) || voices.find(v => v.lang.startsWith('ko'));
    }
