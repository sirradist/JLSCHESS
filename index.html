<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JLS CHESS VOCA Master</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Round:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #4A90E2; --s: #FFD93D; --bg: #F0F7FF; --c: #FFFFFF; --t: #2D3436; --err: #FF6B6B; --ok: #6BCB77; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Nanum Round', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--t); display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; text-align: center; }
        
        header { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 15px 0; }
        .logo-box { height: 45px; display: flex; align-items: center; }
        .logo-img { height: 100%; width: auto; object-fit: contain; }
        h1 { font-size: 1.5rem; color: var(--p); margin: 0; font-weight: 800; }
        
        .setup-box { background: var(--c); padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(74, 144, 226, 0.1); margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        select, .btn-main { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid #E1E8EE; font-size: 16px; font-family: inherit; outline: none; }
        .row { display: flex; gap: 10px; } .row select { flex: 1; }
        .btn-main { background: var(--p); color: #fff; border: none; font-weight: 800; cursor: pointer; box-shadow: 0 4px 0 #357ABD; }
        
        #book-image-container { display: none; margin: 10px 0 15px; padding: 10px; background: #fff; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        #book-cover { max-width: 120px; border-radius: 10px; border: 1px solid #eee; }
        
        .tab-menu { display: none; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .tab-btn { padding: 12px; border-radius: 12px; border: none; background: #BDC3C7; color: #fff; font-weight: 800; cursor: pointer; }
        .tab-btn.active { background: var(--p); }
        #lesson-subtitle { margin: 0 0 15px; font-size: 1.1rem; font-weight: 800; color: #576574; display: none; background: #fff; padding: 12px; border-radius: 15px; border: 2px dashed var(--p); }
        #study-area, #test-area, #puzzle-area { display: none; padding-bottom: 30px; }
        
        .card { background: var(--c); padding: 15px; border-radius: 18px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.04); text-align: left; }
        .word-text { font-size: 1.25rem; font-weight: 800; color: var(--p); }
        .mean-text { font-size: 1.05rem; font-weight: 700; color: #636e72; }
        .hidden { background: var(--s) !important; color: transparent !important; border-radius: 8px; cursor: pointer; position: relative; min-height: 1.2em; }
        .hidden::after { content: '?'; color: #fff; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); font-weight: 800; }
        .tts-icon { width: 44px; height: 44px; border-radius: 50%; border: 2px solid #DFF9FB; background: #F8F9FA; font-size: 1.2rem; cursor: pointer; }
        
        .q-box { background: #fff; padding: 20px; border-radius: 20px; margin-bottom: 12px; text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.04); }
        .q-text { font-size: 1.1rem; font-weight: 800; margin-bottom: 12px; }
        .q-opt { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #E1E8EE; background: #fff; font-weight: 700; text-align: left; margin-bottom: 8px; }
        .q-opt.ok { background: var(--ok) !important; color: #fff; border-color: var(--ok); }
        .q-opt.no { background: var(--err) !important; color: #fff; border-color: var(--err); }
        
        .cw-wrap { overflow-x: auto; background: #fff; padding: 15px; border-radius: 20px; margin-bottom: 15px; }
        .cw-grid { display: grid; gap: 1px; background: #ccc; border: 1px solid #ccc; margin: 0 auto; }
        .cell { width: 28px; height: 28px; background: #fff; position: relative; display: flex; align-items: center; justify-content: center; }
        .cell.empty { background: #34495e; }
        .cell input { width: 100%; height: 100%; border: none; text-align: center; font-size: 0.9rem; font-weight: 800; text-transform: uppercase; color: var(--p); background: transparent; padding: 0; }
        .cell.ok { background: #e8f5e9; }
        .cell-num { position: absolute; top: 0px; left: 1px; font-size: 0.45rem; color: #999; font-weight: 700; }
        
        .h-box { text-align: left; background: #fff; padding: 15px; border-radius: 20px; }
        .h-item { font-size: 0.85rem; font-weight: 700; margin-bottom: 4px; color: #555; }
        .btn-action { background: var(--s); color: var(--t); padding: 14px; border-radius: 15px; border: none; font-weight: 800; width: 100%; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 0 #D4B531; }
        .btn-next { background: var(--ok); color: #fff; box-shadow: 0 4px 0 #529E5A; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="logo-box">
            <img id="main-logo" src="data/JLS%20Logo.png" alt="JLS Logo" class="logo-img" onerror="this.style.display='none'">
        </div>
        <h1>CHESS VOCA Master</h1>
    </header>

    <div class="setup-box">
        <select id="level" onchange="updateUI()">
            <option value="">레벨 선택</option>
            <optgroup label="DS">
                <option value="DSB1">DSB 1</option><option value="DSB2">DSB 2</option>
                <option value="DSC1">DSC 1</option><option value="DSC2">DSC 2</option>
                <option value="DSD1">DSD 1</option><option value="DSD2">DSD 2</option>
            </optgroup>
            <optgroup label="LS">
                <option value="LSA1">LSA 1</option><option value="LSA2">LSA 2</option>
                <option value="LSB1">LSB 1</option><option value="LSB2">LSB 2</option>
                <option value="LSC1">LSC 1</option><option value="LSC2">LSC 2</option>
                <option value="LSD1">LSD 1</option><option value="LSD2">LSD 2</option>
            </optgroup>
            <optgroup label="MS">
                <option value="MSA1">MSA 1</option><option value="MSA2">MSA 2</option>
                <option value="MSB1">MSB 1</option><option value="MSB2">MSB 2</option>
            </optgroup>
        </select>
        <div class="row">
            <select id="book" onchange="updateBookImage()"></select>
            <select id="lesson"></select>
        </div>
        <button class="btn-main" onclick="startStudy()">START!</button>
    </div>

    <div id="book-image-container"><img id="book-cover" src="" alt="Book Cover"></div>

    <div class="tab-menu" id="main-tabs">
        <button id="tab-study" class="tab-btn active" onclick="switchTab('study')">Study</button>
        <button id="tab-test" class="tab-btn" onclick="switchTab('test')">Test</button>
        <button id="tab-puzzle" class="tab-btn" onclick="switchTab('puzzle')">Puzzle</button>
    </div>

    <div id="lesson-subtitle"></div>

    <div id="study-area">
        <div style="display:flex; justify-content:center; gap:10px; margin-bottom:12px; font-size:0.8rem; font-weight:800; color:var(--p);">
            <label><input type="checkbox" id="chkE" onchange="renderStudy()"> 단어 가리기</label>
            <label><input type="checkbox" id="chkK" onchange="renderStudy()"> 뜻 가리기</label>
        </div>
        <div id="study-list"></div>
    </div>
    
    <div id="test-area">
        <button class="btn-action" onclick="renderTest()" style="margin-bottom:15px; background:var(--p); color:#fff; box-shadow: 0 4px 0 #357ABD;">문제 다시 만들기 🔄</button>
        <div id="test-list"></div>
    </div>
